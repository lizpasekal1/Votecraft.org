<script>
const firebaseConfig = {
  apiKey: "AIzaSyArJ6pkXUDbZf4jcxRita0qcdr-hT46kI8",
  authDomain: "votecraft-789.firebaseapp.com",
  projectId: "votecraft-789",
  storageBucket: "votecraft-789.firebasestorage.app",
  messagingSenderId: "939909708303",
  appId: "1:939909708303:web:b0663ec86e15c05b3a817a",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const logEl = document.getElementById('log');
function log(msg, cls='') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

const PAYLOAD = JSON.parse(document.getElementById('payload-data').textContent);
const BATCH_SIZE = 400;

async function seedAll() {
  const allWrites = [
    ...PAYLOAD.genres.map(d => ({ col: 'curated_genres', docId: d.docId, data: d.data })),
    ...PAYLOAD.items.map(d => ({ col: 'curated_items',  docId: d.docId, data: d.data })),
  ];

  log(`Seeding ${allWrites.length} documents…`, 'info');

  for (let i = 0; i < allWrites.length; i += BATCH_SIZE) {
    const slice = allWrites.slice(i, i + BATCH_SIZE);
    const batch = db.batch();
    for (const w of slice) {
      const ref = db.collection(w.col).doc(w.docId);
      batch.set(ref, w.data);
    }
    await batch.commit();
    log(`  ✓ ${Math.min(i + BATCH_SIZE, allWrites.length)} / ${allWrites.length} written`, 'ok');
  }

  log('', '');
  log('✅ Done! All curated data is in Firestore.', 'ok');
  log('Now paste the production rules from firebase/firestore.rules into the Firebase console.', 'info');
}

document.getElementById('btn').addEventListener('click', async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  logEl.textContent = '';
  try {
    await seedAll();
  } catch (e) {
    log('Error: ' + e.message, 'err');
    btn.disabled = false;
  }
});
</script>
