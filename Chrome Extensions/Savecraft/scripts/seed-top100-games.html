async function seedAll() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  if (!email || !pass) { log('Enter email and password first.', 'err'); return; }
  log('Signing in...', 'info');
  await firebase.auth().signInWithEmailAndPassword(email, pass);
  log('Signed in as ' + firebase.auth().currentUser.email, 'ok');

  const allWrites = GAMES.map(g => ({
    col: 'curated_items',
    docId: `top-100-games-cur-top100g-${g.rank}`,
    data: {
      id: `cur-top100g-${g.rank}`,
      title: g.title,
      url: `https://store.steampowered.com/app/${g.appId}`,
      imageUrl: null,
      notes: g.notes,
      genre: 'Top 100',
      category: 'Games'
    }
  }));

  log(`Seeding ${allWrites.length} games...`, 'info');
  const BATCH_SIZE = 50;
  for (let i = 0; i < allWrites.length; i += BATCH_SIZE) {
    const slice = allWrites.slice(i, i + BATCH_SIZE);
    const batch = db.batch();
    for (const w of slice) {
      const ref = db.collection(w.col).doc(w.docId);
      batch.set(ref, w.data);
    }
    await batch.commit();
    log(`  ${Math.min(i + BATCH_SIZE, allWrites.length)} / ${allWrites.length} written`, 'ok');
  }

  log('', '');
  log('Done! 100 games added to curated_items under Top 100 > Games.', 'ok');
  log('Now revert Firestore rules to: allow write: if false', 'info');
  log('Users will see the games after their 24hr cache expires (or clear savecraft_curated_data).', 'info');
}

document.getElementById('btn').addEventListener('click', async () => {

  btn.disabled = true;
  logEl.textContent = '';
  try { await seedAll(); } catch (e) { log('Error: ' + e.message, 'err'); btn.disabled = false; }
